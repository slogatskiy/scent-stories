// ---- math ----
function add(a,b){return a.map((x,i)=>x+b[i]);}
function dot(a,b){return a.reduce((s,x,i)=>s+x*b[i],0);}
function norm(a){return Math.sqrt(dot(a,a))||1;}
function cos(a,b){return dot(a,b)/(norm(a)*norm(b));}

function mean(vs){const m=[0,0,0,0,0,0]; vs.forEach(v=>{for(let i=0;i<6;i++)m[i]+=v[i];}); return m.map(x=>x/vs.length);}
function sub(a,b){return a.map((x,i)=>x-b[i]);}
// Mean-centred: each answer counts as how far it leans FROM the neutral middle of
// its own question, so no axis (e.g. woody) can dominate just by being everywhere.
function profile(){
  let U=[0,0,0,0,0,0];
  if(state.mode==='gift'){
    state.gans.forEach((ci,qi)=>{ if(ci!=null){const o=GIFT[qi].opts; U=add(U,sub(o[ci].x,mean(o.map(x=>x.x))));} });
    return U;
  }
  const mMood=mean(MOOD.map(m=>m.x));
  state.mood.forEach(i=>U=add(U,sub(MOOD[i].x,mMood)));
  if(state.city!=null)U=add(U,sub(CITY[state.city].x,mean(CITY.map(c=>c.x))));
  if(state.texture!=null)U=add(U,sub(TEXTURE[state.texture].x,mean(TEXTURE.map(c=>c.x))));
  if(state.drink!=null)U=add(U,sub(DRINK[state.drink].x,mean(DRINK.map(c=>c.x))));
  if(state.hour!=null)U=add(U,sub(HOUR[state.hour].x,mean(HOUR.map(c=>c.x))));
  state.blitz.forEach((side,i)=>{ if(side!=null)U=add(U,sub(BLITZ[i][side].x,mean([BLITZ[i].a.x,BLITZ[i].b.x]))); });
  return U;
}
function buildSet(U){
  const scored=POOL.map(p=>({p,rel:cos(U,p.x)})).sort((a,b)=>b.rel-a.rel);
  // 1) anchor = the single best match to the vibe
  const anchor=scored[0].p;
  // 2) coherence floor — only scents that share the anchor's DNA are eligible,
  //    so the set reads as one story (no fresh-green next to a smoky oud).
  let coh=0.55, cand=scored.filter(c=>cos(c.p.x,anchor.x)>=coh);
  while(cand.length<5 && coh>0.05){ coh-=0.1; cand=scored.filter(c=>cos(c.p.x,anchor.x)>=coh); }
  // 3) within that family, favour relevance; only nudge away from near-duplicates.
  const pick=[]; const lambda=0.9;
  while(pick.length<5 && cand.length){
    let best=null,bi=0;
    cand.forEach((c,i)=>{
      let maxSim=0; pick.forEach(q=>{maxSim=Math.max(maxSim,cos(c.p.x,q.x));});
      const mmr=lambda*c.rel-(1-lambda)*maxSim;
      if(best===null||mmr>best){best=mmr;bi=i;}
    });
    pick.push(cand[bi].p); cand.splice(bi,1);
  }
  return pick;
}
function archetype(U){
  const idx=U.map((x,i)=>[x,i]).sort((a,b)=>b[0]-a[0]);
  const a=AX[idx[0][1]], b=AX[idx[1][1]];
  if(idx[1][0]<=0) return NAME1[a];
  return NAME2[a+'|'+b]||NAME2[b+'|'+a]||NAME1[a];
}
function fingerprint(U){
  return U.map((x,i)=>[x,i]).sort((a,b)=>b[0]-a[0]).filter(p=>p[0]>0).slice(0,3).map(p=>AX[p[1]]);
}

// ---- state & flow ----
const STEPS=['start','mood','city','texture','drink','hour','blitz','result'];

function lastStep(){return state.mode==='gift'?GIFT.length:6;} // question count per mode
function renderProg(){
  const qn=lastStep(); const cur=Math.min(Math.max(state.i-1,0),qn);
  prog.innerHTML=''; for(let k=0;k<qn;k++){const e=document.createElement('i'); if(k<cur)e.className='on'; prog.appendChild(e);}
  prog.style.visibility=(state.i>=1&&state.i<=qn)?'visible':'hidden';
}
function go(n){state.i=n;render();}
function render(){
  renderProg();
  if(state.i===0)return renderStart();
  const resultStep=lastStep()+1;
  if(state.i===resultStep)return renderResult();
  if(state.mode==='gift')return renderGift(state.i);
  const s=STEPS[state.i];
  if(s==='mood')return renderMood();
  if(s==='city')return renderTiles(CITY,'city','Where would you disappear?','Pick the one that pulls you.','g-city',3);
  if(s==='texture')return renderCards(TEXTURE,'texture','What do you want on your skin?',4);
  if(s==='drink')return renderCards(DRINK,'drink','What’s in your hand?',5);
  if(s==='hour')return renderCards(HOUR,'hour','What time is it for you?',6);
  if(s==='blitz')return renderBlitz();
}
function renderGift(step){
  const qi=step-1, g=GIFT[qi];
  let h='<div class="qz-step"><p class="qz-kick">'+g.kick+'</p><h2 class="qz-q">'+g.q+'</h2>'+
    (g.sub?'<p class="qz-sub">'+g.sub+'</p>':'')+'<div class="qz-grid g-cards">';
  g.opts.forEach((o,i)=>{ h+='<div class="card-opt'+(state.gans[qi]===i?' sel':'')+'" data-i="'+i+'"><h4>'+o.l+'</h4>'+(o.s?'<span>'+o.s+'</span>':'')+'</div>'; });
  h+='</div><button class="qz-next"'+(state.gans[qi]!=null?'':' disabled')+' onclick="go('+(step+1)+')">Continue</button>'+backBtn()+'</div>';
  stage.innerHTML=h;
  stage.querySelectorAll('.card-opt').forEach(t=>t.addEventListener('click',()=>{ state.gans[qi]=+t.dataset.i; render(); }));
}
function backBtn(){return '<button class="qz-back" onclick="go('+(state.i-1)+')">← Back</button>';}

function renderStart(){
  stage.innerHTML='<div class="qz-step qz-start"><p class="qz-kick">Build a set</p>'+
    '<h1>We’ll read the vibe<br/>and curate five.</h1>'+
    '<p>No notes to pick, no bottles to choose. Just a few honest questions — then a set of five 2&nbsp;ml decants, assembled to move together. The scents stay a surprise.</p>'+
    '<div class="mode-choice">'+
      '<button class="mode-card'+(state.mode==='self'?' sel':'')+'" data-mode="self"><h3>For myself</h3><span>Find my next signature</span></button>'+
      '<button class="mode-card'+(state.mode==='gift'?' sel':'')+'" data-mode="gift"><h3>As a gift</h3><span>Build it for someone else</span></button>'+
    '</div>'+
    '<div class="gift-name'+(state.mode==='gift'?' show':'')+'"><input id="recip" type="text" maxlength="24" autocomplete="off" placeholder="Their name (optional)" value="'+state.recip.replace(/"/g,'&quot;')+'"/></div>'+
    '<button class="qz-next" id="beginBtn"'+(state.mode?'':' disabled')+' onclick="go(1)">Begin</button></div>';
  stage.querySelectorAll('.mode-card').forEach(c=>c.addEventListener('click',()=>{
    state.mode=c.dataset.mode; renderStart();
    if(state.mode==='gift'){const r=$('recip'); if(r)r.focus();}
  }));
  const r=$('recip'); if(r)r.addEventListener('input',e=>{state.recip=e.target.value;});
}
function renderMood(){
  let h='<div class="qz-step"><p class="qz-kick">Step 1 · mood</p><h2 class="qz-q">Pick 3 that feel like you.</h2><p class="qz-sub">'+state.mood.length+' / 3 chosen</p><div class="qz-grid g-mood">';
  MOOD.forEach((m,i)=>{ const sel=state.mood.includes(i)?' sel':(state.mood.length>=3?' ':' ');
    h+='<div class="tile'+(state.mood.includes(i)?' sel':'')+'" style="background:'+m.grad+'" data-i="'+i+'"><div class="cap">'+m.cap+'</div></div>'; });
  h+='</div><button class="qz-next" id="moodNext"'+(state.mood.length===3?'':' disabled')+' onclick="go(2)">Continue</button>'+backBtn()+'</div>';
  stage.innerHTML=h;
  stage.querySelectorAll('.tile').forEach(t=>t.addEventListener('click',()=>{
    const i=+t.dataset.i; const k=state.mood.indexOf(i);
    if(k>=0)state.mood.splice(k,1); else if(state.mood.length<3)state.mood.push(i);
    renderMood();
  }));
}
function renderTiles(arr,key,q,sub,grid,nextStep){
  let h='<div class="qz-step"><p class="qz-kick">Step 2 · city</p><h2 class="qz-q">'+q+'</h2><p class="qz-sub">'+sub+'</p><div class="qz-grid '+grid+'">';
  arr.forEach((m,i)=>{ h+='<div class="tile'+(state[key]===i?' sel':'')+'" style="background:'+m.grad+'" data-i="'+i+'"><div class="cap">'+m.cap+'</div></div>'; });
  h+='</div><button class="qz-next"'+(state[key]!=null?'':' disabled')+' onclick="go('+nextStep+')">Continue</button>'+backBtn()+'</div>';
  stage.innerHTML=h;
  stage.querySelectorAll('.tile').forEach(t=>t.addEventListener('click',()=>{ state[key]=+t.dataset.i; render(); }));
}
function renderCards(arr,key,q,nextStep){
  const labels={texture:'Step 3 · texture',drink:'Step 4 · ritual',hour:'Step 5 · hour'};
  let h='<div class="qz-step"><p class="qz-kick">'+labels[key]+'</p><h2 class="qz-q">'+q+'</h2><div class="qz-grid g-cards">';
  arr.forEach((o,i)=>{ h+='<div class="card-opt'+(state[key]===i?' sel':'')+'" data-i="'+i+'"><h4>'+o.l+'</h4><span>'+o.s+'</span></div>'; });
  h+='</div><button class="qz-next"'+(state[key]!=null?'':' disabled')+' onclick="go('+nextStep+')">Continue</button>'+backBtn()+'</div>';
  stage.innerHTML=h;
  stage.querySelectorAll('.card-opt').forEach(t=>t.addEventListener('click',()=>{ state[key]=+t.dataset.i; render(); }));
}
function renderBlitz(){
  let h='<div class="qz-step"><p class="qz-kick">Step 6 · instinct</p><h2 class="qz-q">Quick — don’t think.</h2><p class="qz-sub">Tap the one that’s more you.</p><div class="blitz">';
  BLITZ.forEach((p,i)=>{ h+='<div class="blitz-row" data-i="'+i+'">'+
    '<button class="'+(state.blitz[i]==='a'?'sel':'')+'" data-side="a">'+p.a.l+'</button>'+
    '<button class="'+(state.blitz[i]==='b'?'sel':'')+'" data-side="b">'+p.b.l+'</button></div>'; });
  const done=state.blitz.every(x=>x!=null);
  h+='</div><button class="qz-next"'+(done?'':' disabled')+' id="blitzNext" onclick="go(7)">See my set</button>'+backBtn()+'</div>';
  stage.innerHTML=h;
  stage.querySelectorAll('.blitz-row button').forEach(b=>b.addEventListener('click',()=>{
    const row=+b.parentElement.dataset.i; state.blitz[row]=b.dataset.side; renderBlitz();
  }));
}
function renderResult(){
  const U=profile(); const set=buildSet(U); const name=archetype(U); const fp=fingerprint(U);
  const desc=DESC[name]||'Five decants, chosen to move together.';
  const rows=[0,1,2,3,4].map(i=>'<li>Decant '+('0'+(i+1)).slice(-2)+'<span>🔒 sealed · 2 ml</span></li>').join('');
  const isGift=state.mode==='gift';
  const who=(state.recip||'').trim();
  const kick=isGift?('A gift'+(who?' for '+who:'')):'Your set';
  const closer=isGift?'They open the box to meet all five. You just picked the feeling.':'The five stay sealed until they reach you. Trust the vibe — open the box to meet them.';
  let h='<div class="qz-step"><p class="qz-kick">'+kick+'</p>'+
    '<h2 class="result-archetype">'+name+'</h2>'+
    '<div class="result-fp">'+fp.map(f=>'<span>'+f+'</span>').join('')+'</div>'+
    '<p class="qz-sub" style="max-width:460px;margin:0 auto 1.6rem">'+desc+'</p>'+
    '<ul class="result-five">'+rows+'</ul>'+
    (isGift?'<div class="gift-name show" style="margin:0 auto 1.4rem"><input id="giftNote" type="text" maxlength="120" autocomplete="off" placeholder="Add a gift note (optional)"/></div>':'')+
    '<div class="result-meta"><span class="result-price">$50</span><span class="result-qty">5 × 2 ml · a mystery set</span></div>'+
    '<button class="qz-next" id="addSet">Add to bag</button>'+
    '<div><button class="qz-back" onclick="restart()">Start over</button></div>'+
    '<p class="result-closer">'+closer+'</p></div>';
  stage.innerHTML=h;
  $('addSet').addEventListener('click',()=>{
    const label=isGift?('Gift'+(who?' for '+who:'')+' — '+name):(name+' — mystery set');
    const note=isGift&&$('giftNote')?$('giftNote').value.trim():'';
    try{const c=JSON.parse(localStorage.getItem('ss_cart')||'[]');
      c.push({name:label,price:50,qty:1,contents:set.map(p=>p.n),gift:isGift,recipient:who,note:note});
      localStorage.setItem('ss_cart',JSON.stringify(c));}catch(e){}
    location.href='index.html#bag';
  });
}
function restart(){state={i:0,mode:null,recip:'',gans:[null,null,null,null,null],mood:[],city:null,texture:null,drink:null,hour:null,blitz:[null,null,null,null,null]};render();}
window.go=go; window.restart=restart;
render();
</script>
</body>
</html>
