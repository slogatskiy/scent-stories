<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scent Stories — Build your set</title>
<meta name="description" content="A quiz that reads your vibe and curates a new set of five — just for you." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="quizdark">

<div class="qz-top">
  <a href="index.html#top" class="brand"><svg class="brand-mark" viewBox="0 0 24 32" width="14" aria-hidden="true" style="height:1em;width:.62em"><rect x="8.5" y="2" width="7" height="4.4" rx="1" fill="currentColor"/><rect x="10.5" y="6" width="3" height="2" fill="currentColor"/><rect x="5.5" y="8" width="13" height="22" rx="3" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>Scent&nbsp;Stories</a>
  <div class="qz-prog" id="prog"></div>
  <a href="index.html" class="qz-exit">Exit</a>
</div>

<div class="qz-stage"><div id="stage"></div></div>

<script>
const $=id=>document.getElementById(id);
const stage=$('stage'), prog=$('prog');
const AX=['Citrus','Woody','Amber','Floral','Leather','Oud']; // 6 axes
const v=(a,b,c,d,e,f)=>[a,b,c,d,e,f];

// ---- fragrance pool with 6-axis vectors [citrus,woody,amber,floral,leather,oud] ----
const POOL=[
 {n:'Acqua di Parma — Fico di Amalfi',x:v(3,1,0,1,0,0)},
 {n:'Tom Ford — Neroli Portofino',x:v(3,0,0,1,0,0)},
 {n:'Essential Parfums — Nice Bergamote',x:v(3,1,0,0,0,0)},
 {n:'Creed — Virgin Island Water',x:v(3,0,1,0,0,0)},
 {n:'Atelier Cologne — Orange Sanguine',x:v(3,0,0,0,0,0)},
 {n:'Guerlain — Mandarine Basilic',x:v(3,0,0,1,0,0)},
 {n:'MFK — Aqua Celestia Forte',x:v(3,0,0,1,0,0)},
 {n:'Byredo — Sundazed',x:v(2,0,1,1,0,0)},
 {n:'Creed — Green Irish Tweed',x:v(1,2,0,2,0,0)},
 {n:'Parfums de Marly — Greenley',x:v(1,2,0,1,0,0)},
 {n:'Chanel — Sycomore',x:v(0,3,0,0,1,0)},
 {n:'Lalique — Encre Noire',x:v(0,3,0,0,0,0)},
 {n:'Diptyque — Tam Dao',x:v(0,3,1,0,0,0)},
 {n:'Le Labo — Baie 19',x:v(1,2,0,1,0,0)},
 {n:'Comme des Garçons — Wonderwood',x:v(0,3,0,0,0,1)},
 {n:'Aesop — Hwyl',x:v(0,3,0,0,0,1)},
 {n:'Hermès — H24',x:v(1,2,0,1,0,0)},
 {n:'Essential Parfums — Bois Impérial',x:v(0,3,1,0,0,0)},
 {n:'MFK — Gentle Fluidity Gold',x:v(0,1,2,0,0,1)},
 {n:"Kilian — Angels' Share",x:v(0,1,3,0,0,1)},
 {n:'Nishane — Ani',x:v(1,0,2,0,0,0)},
 {n:'MFK — Grand Soir',x:v(0,0,3,0,0,1)},
 {n:'Mancera — Tonka Cola',x:v(0,0,3,0,0,0)},
 {n:"Kilian — Love, Don't Be Shy",x:v(0,0,2,2,0,0)},
 {n:'Frédéric Malle — Portrait of a Lady',x:v(0,0,1,3,0,1)},
 {n:'Initio — Atomic Rose',x:v(1,1,0,3,0,0)},
 {n:'Mancera — Roses Vanille',x:v(0,0,2,2,0,0)},
 {n:'Guerlain — Insolence',x:v(0,0,1,3,0,0)},
 {n:'Parfums de Marly — Delina',x:v(1,0,1,3,0,0)},
 {n:'Diptyque — Eau Rose',x:v(1,0,0,3,0,0)},
 {n:'Le Labo — Patchouli 24',x:v(0,1,0,0,3,0)},
 {n:'BDK — Gris Charnel',x:v(0,1,1,0,1,1)},
 {n:'Maison Margiela — Jazz Club',x:v(0,1,1,0,2,0)},
 {n:'Tauer — L’Air du Désert Marocain',x:v(0,1,2,0,1,2)},
 {n:'Naomi Goodsir — Bois d’Ascèse',x:v(0,1,0,0,3,0)},
 {n:'Nasomatto — Black Afgano',x:v(0,1,0,0,2,3)},
 {n:'Initio — Oud for Greatness',x:v(0,1,0,0,0,3)},
 {n:'Amouage — Interlude Man',x:v(0,1,1,0,1,3)},
 {n:'MFK — Oud Satin Mood',x:v(0,0,2,1,0,3)},
 {n:'Lattafa — Khamrah',x:v(0,0,3,0,0,2)},
 {n:'Montale — Arabians Tonka',x:v(0,0,2,0,0,3)},
 {n:'Mancera — Red Tobacco',x:v(0,1,1,0,1,2)},
 {n:'Xerjoff — Naxos',x:v(0,1,3,0,0,1)},
];

// ---- questions ----
const MOOD=[
 {cap:'Foggy pier',grad:'linear-gradient(150deg,#9fb1bd,#3f5560)',x:v(2,1,0,0,0,0)},
 {cap:'Neon alley',grad:'linear-gradient(150deg,#4a3a6b,#15121f)',x:v(0,1,0,0,2,1)},
 {cap:'Marble lobby',grad:'linear-gradient(150deg,#dcd6c8,#8a8576)',x:v(1,2,1,0,0,0)},
 {cap:'Desert dusk',grad:'linear-gradient(150deg,#e0a25a,#7a3b1f)',x:v(0,0,2,0,0,2)},
 {cap:'Citrus grove',grad:'linear-gradient(150deg,#e9d77a,#7fa14a)',x:v(3,0,0,1,0,0)},
 {cap:'Leather library',grad:'linear-gradient(150deg,#7a5230,#2e1c10)',x:v(0,1,1,0,3,0)},
 {cap:'Silk & dusk',grad:'linear-gradient(150deg,#e7c2cf,#7d4f63)',x:v(0,0,1,3,0,0)},
 {cap:'Smoke & bass',grad:'linear-gradient(150deg,#3a3a40,#0e0e12)',x:v(0,1,0,0,2,1)},
 {cap:'Pine cabin',grad:'linear-gradient(150deg,#7d9c7e,#26402b)',x:v(0,3,0,0,0,1)},
];
const CITY=[
 {cap:'Tropical island',grad:'linear-gradient(150deg,#7fe3d6,#1f7a86)',x:v(3,0,1,0,0,0)},
 {cap:'Alpine summit',grad:'linear-gradient(150deg,#cfe0e6,#5a7d6a)',x:v(1,3,0,0,0,0)},
 {cap:'Kyoto garden',grad:'linear-gradient(150deg,#9bbf86,#2f4a33)',x:v(0,2,0,1,0,2)},
 {cap:'Tuscan vineyard',grad:'linear-gradient(150deg,#e6c178,#9a5a2a)',x:v(1,1,2,0,0,0)},
 {cap:'Icelandic coast',grad:'linear-gradient(150deg,#9aa6ad,#23303a)',x:v(1,2,0,0,2,0)},
 {cap:'Istanbul bazaar',grad:'linear-gradient(150deg,#e0a85a,#7a2f2a)',x:v(0,0,2,0,0,3)},
];
const TEXTURE=[
 {l:'Linen',s:'cool, easy',x:v(2,1,0,0,0,0)},
 {l:'Leather',s:'worn-in',x:v(0,1,0,0,3,0)},
 {l:'Velvet',s:'deep, plush',x:v(0,0,2,0,0,2)},
 {l:'Silk',s:'soft skin',x:v(0,0,1,2,0,0)},
 {l:'Cashmere',s:'warm wrap',x:v(0,2,1,0,0,0)},
];
const DRINK=[
 {l:'Espresso',s:'dark & sharp',x:v(0,1,2,0,0,0)},
 {l:'Negroni',s:'bitter & bold',x:v(1,0,1,0,0,2)},
 {l:'Matcha',s:'green & calm',x:v(1,2,0,0,0,0)},
 {l:'Whisky',s:'smoky & warm',x:v(0,1,1,0,2,0)},
 {l:'Champagne',s:'bright & light',x:v(2,0,0,1,0,0)},
];
const HOUR=[
 {l:'Dawn',s:'5 AM',x:v(2,0,0,1,0,0)},
 {l:'Golden hour',s:'6 PM',x:v(1,0,2,0,0,0)},
 {l:'Midnight',s:'12 AM',x:v(0,1,0,0,1,1)},
 {l:'3 AM',s:'still out',x:v(0,0,1,0,1,2)},
];
const BLITZ=[
 {a:{l:'City',x:v(0,1,0,0,1,0)},b:{l:'Sea',x:v(2,0,0,0,0,0)}},
 {a:{l:'Smoke',x:v(0,0,0,0,2,1)},b:{l:'Bloom',x:v(0,0,0,2,0,0)}},
 {a:{l:'Gold',x:v(0,0,2,0,0,1)},b:{l:'Silver',x:v(1,2,0,0,0,0)}},
 {a:{l:'Velvet',x:v(0,0,1,0,1,1)},b:{l:'Linen',x:v(2,1,0,0,0,0)}},
 {a:{l:'Be remembered',x:v(0,0,1,0,1,2)},b:{l:'Be a secret',x:v(1,1,0,1,0,0)}},
];

// ---- archetype names by top-2 axes ----
const NAME2={
 'Citrus|Woody':'Sea & Cedar','Citrus|Amber':'Golden Hour','Citrus|Floral':'Garden Bright',
 'Citrus|Leather':'Salt & Smoke','Citrus|Oud':'Desert Citrus','Amber|Woody':'Amber Woods',
 'Floral|Woody':'Green Bloom','Leather|Woody':'Cedar & Leather','Oud|Woody':'Black Forest',
 'Amber|Floral':'Velvet Petal','Amber|Leather':'Honey Leather','Amber|Oud':'Amber Oud',
 'Floral|Leather':'Rose Noir','Floral|Oud':'Oud Rose','Leather|Oud':'Smoke & Oud'};
const NAME1={Citrus:'Pure Citrus',Woody:'Deep Woods',Amber:'Amber Heart',Floral:'In Bloom',Leather:'Leather Bound',Oud:'Oud Royale'};

// ---- math ----
function add(a,b){return a.map((x,i)=>x+b[i]);}
function dot(a,b){return a.reduce((s,x,i)=>s+x*b[i],0);}
function norm(a){return Math.sqrt(dot(a,a))||1;}
function cos(a,b){return dot(a,b)/(norm(a)*norm(b));}

function profile(){
  let U=[0,0,0,0,0,0];
  state.mood.forEach(i=>U=add(U,MOOD[i].x));
  if(state.city!=null)U=add(U,CITY[state.city].x);
  if(state.texture!=null)U=add(U,TEXTURE[state.texture].x);
  if(state.drink!=null)U=add(U,DRINK[state.drink].x);
  if(state.hour!=null)U=add(U,HOUR[state.hour].x);
  state.blitz.forEach((side,i)=>{ if(side!=null)U=add(U,BLITZ[i][side].x); });
  return U;
}
function buildSet(U){
  const scored=POOL.map(p=>({p,rel:cos(U,p.x)})).sort((a,b)=>b.rel-a.rel);
  const pick=[]; const lambda=0.7;
  while(pick.length<5 && scored.length){
    let best=null,bi=-1;
    scored.forEach((c,i)=>{
      let maxSim=0; pick.forEach(q=>{maxSim=Math.max(maxSim,cos(c.p.x,q.x));});
      const mmr=lambda*c.rel-(1-lambda)*maxSim;
      if(best===null||mmr>best){best=mmr;bi=i;}
    });
    pick.push(scored[bi].p); scored.splice(bi,1);
  }
  return pick;
}
function archetype(U){
  const idx=U.map((x,i)=>[x,i]).sort((a,b)=>b[0]-a[0]);
  const a=AX[idx[0][1]], b=AX[idx[1][1]];
  if(idx[1][0]===0) return NAME1[a];
  return NAME2[a+'|'+b]||NAME2[b+'|'+a]||NAME1[a];
}
function fingerprint(U){
  return U.map((x,i)=>[x,i]).sort((a,b)=>b[0]-a[0]).filter(p=>p[0]>0).slice(0,3).map(p=>AX[p[1]]);
}

// ---- state & flow ----
const STEPS=['start','mood','city','texture','drink','hour','blitz','result'];
let state={i:0,mood:[],city:null,texture:null,drink:null,hour:null,blitz:[null,null,null,null,null]};

function renderProg(){
  const qn=6; const cur=Math.min(Math.max(state.i-1,0),qn);
  prog.innerHTML=''; for(let k=0;k<qn;k++){const e=document.createElement('i'); if(k<cur)e.className='on'; prog.appendChild(e);}
  prog.style.visibility=(state.i>=1&&state.i<=6)?'visible':'hidden';
}
function go(n){state.i=n;render();}
function render(){
  renderProg();
  const s=STEPS[state.i];
  if(s==='start')return renderStart();
  if(s==='mood')return renderMood();
  if(s==='city')return renderTiles(CITY,'city','Where would you disappear?','Pick the one that pulls you.','g-city',3);
  if(s==='texture')return renderCards(TEXTURE,'texture','What do you want on your skin?',4);
  if(s==='drink')return renderCards(DRINK,'drink','What’s in your hand?',5);
  if(s==='hour')return renderCards(HOUR,'hour','What time is it for you?',6);
  if(s==='blitz')return renderBlitz();
  if(s==='result')return renderResult();
}
function backBtn(){return '<button class="qz-back" onclick="go('+(state.i-1)+')">← Back</button>';}

function renderStart(){
  stage.innerHTML='<div class="qz-step qz-start"><p class="qz-kick">Build a set</p>'+
    '<h1>We’ll read your vibe<br/>and curate five.</h1>'+
    '<p>No notes to pick, no bottles to choose. Just a few honest questions — then a new set of five 2&nbsp;ml decants, assembled for you. The scents stay a surprise.</p>'+
    '<button class="qz-next" onclick="go(1)">Begin</button></div>';
}
function renderMood(){
  let h='<div class="qz-step"><p class="qz-kick">Step 1 · mood</p><h2 class="qz-q">Pick 3 that feel like you.</h2><p class="qz-sub">'+state.mood.length+' / 3 chosen</p><div class="qz-grid g-mood">';
  MOOD.forEach((m,i)=>{ const sel=state.mood.includes(i)?' sel':(state.mood.length>=3?' ':' ');
    h+='<div class="tile'+(state.mood.includes(i)?' sel':'')+'" style="background:'+m.grad+'" data-i="'+i+'"><div class="cap">'+m.cap+'</div></div>'; });
  h+='</div><button class="qz-next" id="moodNext"'+(state.mood.length===3?'':' disabled')+' onclick="go(2)">Continue</button>'+backBtn()+'</div>';
  stage.innerHTML=h;
  stage.querySelectorAll('.tile').forEach(t=>t.addEventListener('click',()=>{
    const i=+t.dataset.i; const k=state.mood.indexOf(i);
    if(k>=0)state.mood.splice(k,1); else if(state.mood.length<3)state.mood.push(i);
    renderMood();
  }));
}
function renderTiles(arr,key,q,sub,grid,nextStep){
  let h='<div class="qz-step"><p class="qz-kick">Step 2 · city</p><h2 class="qz-q">'+q+'</h2><p class="qz-sub">'+sub+'</p><div class="qz-grid '+grid+'">';
  arr.forEach((m,i)=>{ h+='<div class="tile'+(state[key]===i?' sel':'')+'" style="background:'+m.grad+'" data-i="'+i+'"><div class="cap">'+m.cap+'</div></div>'; });
  h+='</div>'+backBtn()+'</div>';
  stage.innerHTML=h;
  stage.querySelectorAll('.tile').forEach(t=>t.addEventListener('click',()=>{ state[key]=+t.dataset.i; render(); setTimeout(()=>go(nextStep),260); }));
}
function renderCards(arr,key,q,nextStep){
  const labels={texture:'Step 3 · texture',drink:'Step 4 · ritual',hour:'Step 5 · hour'};
  let h='<div class="qz-step"><p class="qz-kick">'+labels[key]+'</p><h2 class="qz-q">'+q+'</h2><div class="qz-grid g-cards">';
  arr.forEach((o,i)=>{ h+='<div class="card-opt'+(state[key]===i?' sel':'')+'" data-i="'+i+'"><h4>'+o.l+'</h4><span>'+o.s+'</span></div>'; });
  h+='</div>'+backBtn()+'</div>';
  stage.innerHTML=h;
  stage.querySelectorAll('.card-opt').forEach(t=>t.addEventListener('click',()=>{ state[key]=+t.dataset.i; render(); setTimeout(()=>go(nextStep),260); }));
}
function renderBlitz(){
  let h='<div class="qz-step"><p class="qz-kick">Step 6 · instinct</p><h2 class="qz-q">Quick — don’t think.</h2><p class="qz-sub">Tap the one that’s more you.</p><div class="blitz">';
  BLITZ.forEach((p,i)=>{ h+='<div class="blitz-row" data-i="'+i+'">'+
    '<button class="'+(state.blitz[i]==='a'?'sel':'')+'" data-side="a">'+p.a.l+'</button>'+
    '<button class="'+(state.blitz[i]==='b'?'sel':'')+'" data-side="b">'+p.b.l+'</button></div>'; });
  const done=state.blitz.every(x=>x!=null);
  h+='</div><button class="qz-next"'+(done?'':' disabled')+' id="blitzNext" onclick="go(7)">See my set</button>'+backBtn()+'</div>';
  stage.innerHTML=h;
  stage.querySelectorAll('.blitz-row button').forEach(b=>b.addEventListener('click',()=>{
    const row=+b.parentElement.dataset.i; state.blitz[row]=b.dataset.side; renderBlitz();
  }));
}
function renderResult(){
  const U=profile(); const set=buildSet(U); const name=archetype(U); const fp=fingerprint(U);
  let h='<div class="qz-step"><p class="qz-kick">Your set</p>'+
    '<h2 class="result-archetype">'+name+'</h2>'+
    '<div class="result-fp">'+fp.map(f=>'<span>'+f+'</span>').join('')+'</div>'+
    '<ul class="result-five">'+set.map((p,i)=>'<li>'+p.n+'<span>2 ml</span></li>').join('')+'</ul>'+
    '<div class="result-meta"><span class="result-price">$50</span><span class="result-qty">5 × 2 ml · a new set</span></div>'+
    '<button class="qz-next" id="addSet">Add to bag</button>'+
    '<div><button class="qz-back" onclick="restart()">Start over</button></div>'+
    '<p class="qz-sub" style="margin-top:1.6rem">Names shown for the concept — at launch they stay a surprise.</p></div>';
  stage.innerHTML=h;
  $('addSet').addEventListener('click',()=>{
    try{const c=JSON.parse(localStorage.getItem('ss_cart')||'[]'); c.push({name:name+' — your set',price:50,qty:1}); localStorage.setItem('ss_cart',JSON.stringify(c));}catch(e){}
    location.href='index.html#bag';
  });
}
function restart(){state={i:0,mood:[],city:null,texture:null,drink:null,hour:null,blitz:[null,null,null,null,null]};render();}
window.go=go; window.restart=restart;
render();
</script>
</body>
</html>
